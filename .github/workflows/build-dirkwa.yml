name: build-dirkwa

on:
  schedule:
    - cron: "45 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: build-dirkwa
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/signalk-server
  UPSTREAM: SignalK/signalk-server
  PRS: "2588 2524 2837"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      composite: ${{ steps.shas.outputs.composite }}
      changed: ${{ steps.gate.outputs.changed }}
      combined_sha: ${{ steps.stack.outputs.combined_sha }}
      combined_short: ${{ steps.stack.outputs.combined_short }}
      version: ${{ steps.stack.outputs.version }}
    steps:
      - uses: actions/checkout@v7

      - name: Resolve upstream master + PR SHAs
        id: shas
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          MASTER_SHA=$(gh api repos/${{ env.UPSTREAM }}/commits/master --jq .sha)
          composite="master:$MASTER_SHA"
          for pr in ${{ env.PRS }}; do
            pr_sha=$(gh api repos/${{ env.UPSTREAM }}/pulls/$pr --jq '.head.sha')
            composite="$composite pr$pr:$pr_sha"
          done
          echo "composite=$composite" >> "$GITHUB_OUTPUT"
          echo "Composite key: $composite"

      - name: Compare to last-built state
        id: gate
        run: |
          set -euo pipefail
          LAST=$(cat state/last-dirkwa.txt 2>/dev/null || echo "")
          NEW="${{ steps.shas.outputs.composite }}"
          if [ "$LAST" = "$NEW" ]; then
            echo "No change. Skipping build."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Stack changed."
            echo "  was: $LAST"
            echo "  new: $NEW"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Clone master + merge PR stack
        if: steps.gate.outputs.changed == 'true'
        id: stack
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          rm -rf signalk-src
          git clone https://github.com/${{ env.UPSTREAM }}.git signalk-src

          # Seed pre-recorded conflict resolutions (see ./rerere-cache/README.md)
          # BEFORE cd'ing in, so known adjacent-edit conflicts between stacked
          # PRs replay automatically instead of failing the build. New or changed
          # conflicts still fail hard below (rerere only resolves what it recorded).
          git config --global rerere.enabled true
          git config --global rerere.autoupdate true
          if [ -d rerere-cache ]; then
            mkdir -p signalk-src/.git/rr-cache
            # Copy only the hash-named resolution dirs, not the README.
            for d in rerere-cache/*/; do
              [ -d "$d" ] && cp -r "$d" signalk-src/.git/rr-cache/
            done
            echo "Seeded rr-cache: $(ls signalk-src/.git/rr-cache 2>/dev/null | tr '\n' ' ')"
          fi

          cd signalk-src
          git config user.email "build@dirkwa.local"
          git config user.name  "dirkwa build"
          git checkout master

          for pr in ${{ env.PRS }}; do
            echo "::group::Merging PR #$pr"
            head_sha=$(gh api repos/${{ env.UPSTREAM }}/pulls/$pr --jq '.head.sha')
            git fetch origin "pull/$pr/head:pr-$pr"
            if git merge --no-ff --no-edit -m "Merge SignalK/signalk-server#$pr ($head_sha)" "pr-$pr"; then
              echo "::endgroup::"
              continue
            fi
            # Merge reported conflicts. rerere (autoupdate) replays and stages any
            # resolution it has on record; if nothing is left unresolved AND no
            # conflict markers survive in the tree, the merge is safe to commit.
            # Otherwise it is a new/unreviewed conflict -> fail hard.
            unmerged=$(git diff --name-only --diff-filter=U)
            markers=$(git -c core.pager=cat grep -lE '^(<{7}|={7}|>{7})( |$)' -- . || true)
            if [ -z "$unmerged" ] && [ -z "$markers" ]; then
              git commit --no-edit -m "Merge SignalK/signalk-server#$pr ($head_sha)"
              echo "::notice::PR #$pr conflict auto-resolved from rerere-cache."
              echo "::endgroup::"
              continue
            fi
            echo "::error::PR #$pr conflicts with the current stack on master (no recorded rerere resolution)."
            echo "Unmerged files:"; git diff --name-only --diff-filter=U || true
            git merge --abort || true
            exit 1
          done

          combined_sha=$(git rev-parse HEAD)
          echo "combined_sha=$combined_sha" >> "$GITHUB_OUTPUT"
          echo "combined_short=${combined_sha:0:7}" >> "$GITHUB_OUTPUT"

          # signalk-server version for the org.opencontainers.image.version
          # label. Best-effort: the updater's RuntimeIdentity resolver uses
          # the label as its backup answer when the live /signalk probe
          # can't reach the server; an empty label leaves the Dashboard
          # showing no version at all on such installs.
          version=$(jq -r '.version // empty' package.json || true)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "signalk-server version: ${version:-<none>}"

          # Remove .git so the artifact stays small and the build context
          # later doesn't hash a giant pack file.
          rm -rf .git

      - name: Upload prepared source as artifact
        if: steps.gate.outputs.changed == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: signalk-src
          path: signalk-src
          include-hidden-files: true
          retention-days: 1

  build:
    needs: prepare
    if: needs.prepare.outputs.changed == 'true'
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch_label: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch_label: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7

      - name: Restore prepared source
        uses: actions/download-artifact@v8
        with:
          name: signalk-src
          path: signalk-src

      - name: Build single-arch image
        id: build
        uses: ./.github/actions/build-and-push-arch
        with:
          platform: ${{ matrix.platform }}
          source: local
          version: ${{ needs.prepare.outputs.version }}
          image: ${{ env.IMAGE }}
          upstream_sha: ${{ needs.prepare.outputs.combined_sha }}

      - name: Stash digest for the merge job
        run: |
          set -euo pipefail
          mkdir -p /tmp/digests
          echo "${{ steps.build.outputs.digest }}" > /tmp/digests/${{ matrix.arch_label }}

      - name: Upload digest artifact
        uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.arch_label }}
          path: /tmp/digests/${{ matrix.arch_label }}
          retention-days: 1

  merge:
    needs: [prepare, build]
    if: needs.prepare.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Download digest artifacts
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: false

      - name: Create multi-arch manifest
        run: |
          set -euo pipefail
          AMD_DIGEST=$(cat /tmp/digests/digest-amd64/amd64)
          ARM_DIGEST=$(cat /tmp/digests/digest-arm64/arm64)
          if [ -z "$AMD_DIGEST" ] || [ -z "$ARM_DIGEST" ]; then
            echo "Missing digests: amd64=$AMD_DIGEST arm64=$ARM_DIGEST" >&2
            exit 1
          fi
          docker buildx imagetools create \
            -t ${{ env.IMAGE }}:dirkwa \
            -t ${{ env.IMAGE }}:dirkwa-${{ needs.prepare.outputs.combined_short }} \
            ${{ env.IMAGE }}@${AMD_DIGEST} \
            ${{ env.IMAGE }}@${ARM_DIGEST}

      - name: Update state file
        run: |
          ./scripts/commit-state.sh \
            state/last-dirkwa.txt \
            "${{ needs.prepare.outputs.composite }}" \
            "chore(state): dirkwa ${{ needs.prepare.outputs.combined_short }} [skip ci]"
