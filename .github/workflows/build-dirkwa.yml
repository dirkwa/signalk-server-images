name: build-dirkwa

on:
  schedule:
    - cron: "45 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: build-dirkwa
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/signalk-server
  UPSTREAM: SignalK/signalk-server
  PRS: "2588 2524"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      composite: ${{ steps.shas.outputs.composite }}
      changed: ${{ steps.gate.outputs.changed }}
      combined_sha: ${{ steps.stack.outputs.combined_sha }}
      combined_short: ${{ steps.stack.outputs.combined_short }}
    steps:
      - uses: actions/checkout@v7

      - name: Resolve upstream master + PR SHAs
        id: shas
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          MASTER_SHA=$(gh api repos/${{ env.UPSTREAM }}/commits/master --jq .sha)
          composite="master:$MASTER_SHA"
          for pr in ${{ env.PRS }}; do
            pr_sha=$(gh api repos/${{ env.UPSTREAM }}/pulls/$pr --jq '.head.sha')
            composite="$composite pr$pr:$pr_sha"
          done
          echo "composite=$composite" >> "$GITHUB_OUTPUT"
          echo "Composite key: $composite"

      - name: Compare to last-built state
        id: gate
        run: |
          set -euo pipefail
          LAST=$(cat state/last-dirkwa.txt 2>/dev/null || echo "")
          NEW="${{ steps.shas.outputs.composite }}"
          if [ "$LAST" = "$NEW" ]; then
            echo "No change. Skipping build."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Stack changed."
            echo "  was: $LAST"
            echo "  new: $NEW"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Clone master + merge PR stack
        if: steps.gate.outputs.changed == 'true'
        id: stack
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          rm -rf signalk-src
          git clone https://github.com/${{ env.UPSTREAM }}.git signalk-src
          cd signalk-src
          git config user.email "build@dirkwa.local"
          git config user.name  "dirkwa build"
          git checkout master

          for pr in ${{ env.PRS }}; do
            echo "::group::Merging PR #$pr"
            head_sha=$(gh api repos/${{ env.UPSTREAM }}/pulls/$pr --jq '.head.sha')
            git fetch origin "pull/$pr/head:pr-$pr"
            if ! git merge --no-ff --no-edit -m "Merge SignalK/signalk-server#$pr ($head_sha)" "pr-$pr"; then
              echo "::error::PR #$pr conflicts with the current stack on master."
              git merge --abort || true
              exit 1
            fi
            echo "::endgroup::"
          done

          combined_sha=$(git rev-parse HEAD)
          echo "combined_sha=$combined_sha" >> "$GITHUB_OUTPUT"
          echo "combined_short=${combined_sha:0:7}" >> "$GITHUB_OUTPUT"

          # Remove .git so the artifact stays small and the build context
          # later doesn't hash a giant pack file.
          rm -rf .git

      - name: Upload prepared source as artifact
        if: steps.gate.outputs.changed == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: signalk-src
          path: signalk-src
          include-hidden-files: true
          retention-days: 1

  build:
    needs: prepare
    if: needs.prepare.outputs.changed == 'true'
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch_label: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch_label: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7

      - name: Restore prepared source
        uses: actions/download-artifact@v8
        with:
          name: signalk-src
          path: signalk-src

      - name: Build single-arch image
        id: build
        uses: ./.github/actions/build-and-push-arch
        with:
          platform: ${{ matrix.platform }}
          source: local
          image: ${{ env.IMAGE }}
          upstream_sha: ${{ needs.prepare.outputs.combined_sha }}

      - name: Stash digest for the merge job
        run: |
          set -euo pipefail
          mkdir -p /tmp/digests
          echo "${{ steps.build.outputs.digest }}" > /tmp/digests/${{ matrix.arch_label }}

      - name: Upload digest artifact
        uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.arch_label }}
          path: /tmp/digests/${{ matrix.arch_label }}
          retention-days: 1

  merge:
    needs: [prepare, build]
    if: needs.prepare.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Download digest artifacts
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: false

      - name: Create multi-arch manifest
        run: |
          set -euo pipefail
          AMD_DIGEST=$(cat /tmp/digests/digest-amd64/amd64)
          ARM_DIGEST=$(cat /tmp/digests/digest-arm64/arm64)
          if [ -z "$AMD_DIGEST" ] || [ -z "$ARM_DIGEST" ]; then
            echo "Missing digests: amd64=$AMD_DIGEST arm64=$ARM_DIGEST" >&2
            exit 1
          fi
          docker buildx imagetools create \
            -t ${{ env.IMAGE }}:dirkwa \
            -t ${{ env.IMAGE }}:dirkwa-${{ needs.prepare.outputs.combined_short }} \
            ${{ env.IMAGE }}@${AMD_DIGEST} \
            ${{ env.IMAGE }}@${ARM_DIGEST}

      - name: Update state file
        run: |
          ./scripts/commit-state.sh \
            state/last-dirkwa.txt \
            "${{ needs.prepare.outputs.composite }}" \
            "chore(state): dirkwa ${{ needs.prepare.outputs.combined_short }} [skip ci]"
