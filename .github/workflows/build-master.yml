name: build-master

on:
  schedule:
    - cron: "15 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: build-master
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/signalk-server
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.sha.outputs.sha }}
      short: ${{ steps.sha.outputs.short }}
      changed: ${{ steps.gate.outputs.changed }}
    steps:
      - uses: actions/checkout@v6

      - name: Resolve upstream master HEAD
        id: sha
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          SHA=$(gh api repos/SignalK/signalk-server/commits/master --jq .sha)
          if [ -z "$SHA" ] || [ "$SHA" = "null" ]; then
            echo "Failed to resolve master HEAD" >&2; exit 1
          fi
          echo "sha=$SHA"            >> "$GITHUB_OUTPUT"
          echo "short=${SHA:0:7}"    >> "$GITHUB_OUTPUT"

      - name: Compare to last-built state
        id: gate
        run: |
          set -euo pipefail
          LAST=$(cat state/last-master-sha.txt 2>/dev/null || echo "")
          NEW="${{ steps.sha.outputs.sha }}"
          if [ "$LAST" = "$NEW" ]; then
            echo "No change ($LAST). Skipping build."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "master changed: $LAST -> $NEW"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: prepare
    if: needs.prepare.outputs.changed == 'true'
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch_label: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch_label: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Build single-arch image
        id: build
        uses: ./.github/actions/build-and-push-arch
        with:
          platform: ${{ matrix.platform }}
          source: git
          git_ref: master
          image: ${{ env.IMAGE }}
          upstream_sha: ${{ needs.prepare.outputs.sha }}

      - name: Stash digest for the merge job
        run: |
          set -euo pipefail
          mkdir -p /tmp/digests
          echo "${{ steps.build.outputs.digest }}" > /tmp/digests/${{ matrix.arch_label }}

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.arch_label }}
          path: /tmp/digests/${{ matrix.arch_label }}
          retention-days: 1

  merge:
    needs: [prepare, build]
    if: needs.prepare.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Download digest artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: false

      - name: Create multi-arch manifest
        run: |
          set -euo pipefail
          AMD_DIGEST=$(cat /tmp/digests/digest-amd64/amd64)
          ARM_DIGEST=$(cat /tmp/digests/digest-arm64/arm64)
          if [ -z "$AMD_DIGEST" ] || [ -z "$ARM_DIGEST" ]; then
            echo "Missing digests: amd64=$AMD_DIGEST arm64=$ARM_DIGEST" >&2
            exit 1
          fi
          docker buildx imagetools create \
            -t ${{ env.IMAGE }}:master \
            -t ${{ env.IMAGE }}:master-${{ needs.prepare.outputs.short }} \
            ${{ env.IMAGE }}@${AMD_DIGEST} \
            ${{ env.IMAGE }}@${ARM_DIGEST}

      - name: Update state file
        run: |
          ./scripts/commit-state.sh \
            state/last-master-sha.txt \
            "${{ needs.prepare.outputs.sha }}" \
            "chore(state): master ${{ needs.prepare.outputs.short }} [skip ci]"
